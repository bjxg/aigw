services:
  aigw:
    image: ${AIGW_IMAGE:-ghcr.io/bjxg/aigw:latest}
    pull_policy: ${AIGW_PULL_POLICY:-always}
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VERSION: ${VERSION:-dev}
        COMMIT: ${COMMIT:-none}
        BUILD_DATE: ${BUILD_DATE:-unknown}
        UI_VERSION: ${UI_VERSION:-dev}
        FRONTEND_REPOSITORY: ${FRONTEND_REPOSITORY:-https://github.com/bjxg/aigw-panel.git}
        FRONTEND_REF: ${FRONTEND_REF:-main}
        FRONTEND_COMMIT: ${FRONTEND_COMMIT:-}
    container_name: aigw
    environment:
      AIGW_LOCALE: ${AIGW_LOCALE:-zh}
      LANG: ${AIGW_LANG:-C.UTF-8}
      LANGUAGE: ${AIGW_LANGUAGE:-en_US:en}
      LC_ALL: ${AIGW_LANG:-C.UTF-8}
    ports:
      - "8217:8217"
      - "127.0.0.1:8085:8085"
      - "127.0.0.1:1455:1455"
      - "127.0.0.1:54545:54545"
      - "127.0.0.1:51121:51121"
      - "127.0.0.1:11451:11451"
    volumes:
      - ${AIGW_CONFIG_PATH:-${AIGW_PROJECT_DIR:-${PWD:-.}}/config.yaml}:/aigw/config.yaml
      - ${AIGW_LOG_PATH:-${AIGW_PROJECT_DIR:-${PWD:-.}}/logs}:/aigw/logs
      - ${AIGW_DATA_PATH:-${AIGW_PROJECT_DIR:-${PWD:-.}}/data}:/aigw/data
    restart: unless-stopped
