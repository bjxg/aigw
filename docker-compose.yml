services:
  aigw:
    image: ${CLI_PROXY_IMAGE:-ghcr.io/bjxg/aigw:latest}
    pull_policy: ${CLI_PROXY_PULL_POLICY:-always}
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VERSION: ${VERSION:-dev}
        COMMIT: ${COMMIT:-none}
        BUILD_DATE: ${BUILD_DATE:-unknown}
        UI_VERSION: ${UI_VERSION:-dev}
        FRONTEND_REPOSITORY: ${FRONTEND_REPOSITORY:-https://github.com/bjxg/aigw-panel.git}
        FRONTEND_REF: ${FRONTEND_REF:-main}
        FRONTEND_COMMIT: ${FRONTEND_COMMIT:-}
    container_name: aigw
    environment:
      aigw_LOCALE: ${aigw_LOCALE:-zh}
      AUTH_PATH: ${AUTH_PATH:-/root/.cli-proxy-api}
      LANG: ${aigw_LANG:-C.UTF-8}
      LANGUAGE: ${aigw_LANGUAGE:-en_US:en}
      LC_ALL: ${aigw_LANG:-C.UTF-8}
    ports:
      - "8317:8317"
      - "127.0.0.1:8085:8085"
      - "127.0.0.1:1455:1455"
      - "127.0.0.1:54545:54545"
      - "127.0.0.1:51121:51121"
      - "127.0.0.1:11451:11451"
    volumes:
      - ${CLI_PROXY_CONFIG_PATH:-${aigw_PROJECT_DIR:-${PWD:-.}}/config.yaml}:/CLIProxyAPI/config.yaml
      - ${CLI_PROXY_AUTH_PATH:-${aigw_PROJECT_DIR:-${PWD:-.}}/auths}:${AUTH_PATH:-/root/.cli-proxy-api}
      - ${CLI_PROXY_LOG_PATH:-${aigw_PROJECT_DIR:-${PWD:-.}}/logs}:/CLIProxyAPI/logs
      - ${CLI_PROXY_DATA_PATH:-${aigw_PROJECT_DIR:-${PWD:-.}}/data}:/CLIProxyAPI/data
    restart: unless-stopped
